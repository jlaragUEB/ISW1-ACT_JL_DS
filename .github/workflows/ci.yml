name: CI Pipeline — ISW1

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ main ]

jobs:
  # ─────────────────────────────────────────────
  # JOB 1: Backend — Build + Tests + SonarCloud
  # ─────────────────────────────────────────────
  backend:
    name: Backend (Java / Maven)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: financiero_db
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # necesario para SonarCloud

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Maven
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('backend/pom.xml') }}
          restore-keys: ${{ runner.os }}-maven-

      - name: Inicializar base de datos
        run: |
          PGPASSWORD=postgres psql -h localhost -U postgres -c "CREATE DATABASE financiero_db;" || true
          PGPASSWORD=postgres psql -h localhost -U postgres -d financiero_db -f db_script.sql

      - name: Compilar y ejecutar pruebas
        working-directory: backend
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/financiero_db
          SPRING_DATASOURCE_USERNAME: postgres
          SPRING_DATASOURCE_PASSWORD: postgres
        run: mvn clean verify

      - name: Análisis SonarCloud
        working-directory: backend
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          mvn sonar:sonar \
            -Dsonar.projectKey=${{ secrets.SONAR_PROJECT_KEY }} \
            -Dsonar.organization=${{ secrets.SONAR_ORGANIZATION }} \
            -Dsonar.host.url=https://sonarcloud.io
        continue-on-error: true   # no falla el pipeline si SonarCloud no está configurado aún

  # ─────────────────────────────────────────────
  # JOB 2: Frontend — Install + Build
  # ─────────────────────────────────────────────
  frontend:
    name: Frontend (React / Vite)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar dependencias
        working-directory: frontend
        run: npm ci

      - name: Build de producción
        working-directory: frontend
        run: npm run build
